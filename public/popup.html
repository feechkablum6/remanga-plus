<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Remanga Enhancer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #131416;
        --bg-elevated: #18191b;
        --border: #27272a;
        --border-soft: rgba(64, 64, 67, 0.5);
        --text: #fafafa;
        --text-muted: #8a8f9c;
        --accent: #3edae0;
        --accent-soft: rgba(62, 218, 224, 0.12);
        --danger: #ff6b6b;
        --pill-off: rgba(255, 255, 255, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      @keyframes rre-fade-up {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes rre-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes rre-spin {
        to {
          transform: rotate(360deg);
        }
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(
            120% 80% at 0% 0%,
            rgba(62, 218, 224, 0.06) 0%,
            transparent 55%
          ),
          var(--bg);
        color: var(--text);
        font-family: "Exo 2", system-ui, -apple-system, sans-serif;
        font-size: 13px;
        width: 320px;
        overflow-x: hidden;
      }

      .header {
        padding: 16px 18px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border-soft);
        animation: rre-fade-up 320ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .header__mark {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: block;
        flex-shrink: 0;
        box-shadow: 0 0 0 1px var(--border);
      }

      .header__title {
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.01em;
        flex: 1;
      }

      .header__chip {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--accent);
        padding: 3px 8px;
        border: 1px solid rgba(62, 218, 224, 0.35);
        border-radius: 999px;
        background: var(--accent-soft);
      }

      .section {
        position: relative;
        padding: 14px 18px 8px 18px;
        border-bottom: 1px solid var(--border-soft);
        animation: rre-fade-up 360ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .section:nth-of-type(1) {
        animation-delay: 60ms;
      }
      .section:nth-of-type(2) {
        animation-delay: 130ms;
      }

      .section:last-of-type {
        border-bottom: none;
      }

      .section__heading {
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        margin: 0 0 12px;
        font-weight: 600;
      }

      .section__index {
        font-feature-settings: "tnum";
        color: var(--accent);
        opacity: 0.7;
        font-weight: 700;
      }

      .section__heading::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to right,
          var(--border-soft) 0%,
          transparent 100%
        );
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 8px;
        margin: 0 -8px;
        border-radius: 8px;
        cursor: pointer;
        user-select: none;
        animation: rre-fade-in 260ms ease both;
        transition: background-color 140ms ease;
      }

      .toggle:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .toggle__label {
        font-size: 13px;
        transition: color 140ms ease;
      }

      .toggle:hover .toggle__label {
        color: var(--accent);
      }

      .toggle__switch {
        position: relative;
        width: 32px;
        height: 18px;
        border-radius: 999px;
        background: var(--pill-off);
        transition: background 160ms ease;
        flex-shrink: 0;
      }

      .toggle__switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--text);
        transition: transform 130ms cubic-bezier(0.2, 0.8, 0.2, 1),
          background 100ms ease;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      }

      .toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .toggle input:checked + .toggle__switch {
        background: var(--accent);
      }

      .toggle input:checked + .toggle__switch::after {
        transform: translateX(14px);
        background: var(--bg);
      }

      .actions {
        padding: 14px 18px 18px;
        animation: rre-fade-up 360ms cubic-bezier(0.2, 0.8, 0.2, 1) 200ms both;
      }

      .server-status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 4px 10px;
        font-size: 11px;
        color: var(--text-muted);
        font-feature-settings: "tnum";
      }

      .server-status__dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
        transition: background 200ms ease, box-shadow 200ms ease;
      }

      .server-status[data-state="ok"] .server-status__dot {
        background: var(--accent);
        box-shadow: 0 0 0 3px rgba(62, 218, 224, 0.16);
      }

      .server-status[data-state="ok"] .server-status__label {
        color: var(--text);
      }

      .server-status[data-state="down"] .server-status__dot {
        background: var(--danger);
        box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.16);
      }

      .server-status[data-state="down"] .server-status__label {
        color: var(--danger);
      }

      .button {
        position: relative;
        width: 100%;
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(62, 218, 224, 0.3);
        border-radius: 999px;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        overflow: hidden;
        transition: background 140ms ease, transform 120ms ease,
          border-color 140ms ease;
      }

      .button::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          110deg,
          transparent 30%,
          rgba(62, 218, 224, 0.14) 50%,
          transparent 70%
        );
        transform: translateX(-120%);
        transition: transform 600ms ease;
        pointer-events: none;
      }

      .button:hover {
        background: rgba(62, 218, 224, 0.18);
        border-color: rgba(62, 218, 224, 0.5);
      }

      .button:hover::before {
        transform: translateX(120%);
      }

      .button:active {
        transform: translateY(1px);
      }

      .button[data-state="busy"] {
        pointer-events: none;
      }

      .button[data-state="busy"] .button__icon {
        animation: rre-spin 900ms linear infinite;
      }

      .button[data-state="error"] {
        color: var(--danger);
        border-color: rgba(255, 107, 107, 0.4);
        background: rgba(255, 107, 107, 0.12);
      }

      .button__icon {
        width: 14px;
        height: 14px;
      }

      .status {
        margin-top: 8px;
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        min-height: 14px;
        transition: color 160ms ease, opacity 200ms ease;
      }

      .status:empty {
        opacity: 0;
      }

      .import-section {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
      }

      .import-section h2 {
        font-size: 14px;
        margin: 0 0 8px;
        color: var(--text-muted);
        font-weight: 600;
      }

      .auth-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        padding: 4px 0;
      }

      .auth-row span[data-state="ok"] {
        color: #4ade80;
      }

      .auth-row span[data-state="bad"] {
        color: #ef4444;
      }

      .import-section button.primary {
        width: 100%;
        margin-top: 8px;
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(62, 218, 224, 0.3);
        border-radius: 999px;
        padding: 8px 14px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .import-section button.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      [data-resume-banner] {
        margin-top: 8px;
        padding: 8px;
        background: rgba(251, 191, 36, 0.12);
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <img class="header__mark" src="icons/icon-128.png" alt="" />
      <span class="header__title">Remanga Enhancer</span>
      <span class="header__chip">v0.3</span>
    </header>

    <section class="section" data-section="header-buttons">
      <h2 class="section__heading">
        <span class="section__index">01</span>
        Шапка сайта
      </h2>
      <div data-toggle-group="hideHeaderButtons"></div>
    </section>

    <section class="section" data-section="home">
      <h2 class="section__heading">
        <span class="section__index">02</span>
        Главный экран
      </h2>
      <div data-toggle-group="home"></div>
    </section>

    <section class="actions">
      <div class="server-status" data-server-status>
        <span class="server-status__dot" data-server-dot></span>
        <span class="server-status__label" data-server-label>Проверка…</span>
      </div>
      <button class="button" data-action="restart-parser">
        <svg class="button__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M4 12a8 8 0 0 1 13.66-5.66M20 12a8 8 0 0 1-13.66 5.66M16 4v4h4M8 20v-4H4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Перезапустить parser-server
      </button>
      <div class="status" data-status></div>
    </section>

    <section data-import-section class="import-section">
      <h2>Импорт закладок из MangaLib</h2>
      <div class="auth-row"><span>MangaLib:</span> <span data-auth-mangalib data-state="checking">проверяю…</span></div>
      <div class="auth-row"><span>Remanga:</span> <span data-auth-remanga data-state="checking">проверяю…</span></div>
      <button class="primary" data-import-button disabled>Импорт закладок из MangaLib</button>
      <div data-resume-banner hidden></div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
