<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Remanga Enhancer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #131416;
        --bg-elevated: #18191b;
        --border: #27272a;
        --border-soft: rgba(64, 64, 67, 0.5);
        --text: #fafafa;
        --text-muted: #8a8f9c;
        --accent: #3edae0;
        --accent-soft: rgba(62, 218, 224, 0.12);
        --danger: #ff6b6b;
        --pill-off: rgba(255, 255, 255, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      @keyframes rre-fade-up {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes rre-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes rre-spin {
        to { transform: rotate(360deg); }
      }

      html, body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(120% 80% at 0% 0%, rgba(62, 218, 224, 0.06) 0%, transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: "Exo 2", system-ui, -apple-system, sans-serif;
        font-size: 14px;
        width: 360px;
        overflow-x: hidden;
      }

      /* Header */
      .header {
        padding: 16px 16px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border-soft);
        animation: rre-fade-up 320ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .header__mark {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        display: block;
        flex-shrink: 0;
        box-shadow: 0 0 0 1px var(--border);
      }
      .header__title {
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 0.01em;
        flex: 1;
      }
      .header__chip {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--accent);
        padding: 4px 10px;
        border: 1px solid rgba(62, 218, 224, 0.35);
        border-radius: 999px;
        background: var(--accent-soft);
      }

      /* Screens (only one visible at a time) */
      .screens { position: relative; }
      .screen { padding: 0; }
      .screen[hidden] { display: none; }

      /* Cards */
      .cards {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 16px 16px 14px;
      }
      .card {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 16px;
        min-height: 84px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 14px;
        color: var(--text);
        font: inherit;
        cursor: pointer;
        text-align: left;
        transition: background 140ms ease, border-color 140ms ease;
      }
      .card:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(62, 218, 224, 0.3);
      }
      .card__icon {
        width: 44px;
        height: 44px;
        color: var(--accent);
        flex-shrink: 0;
      }
      .card__body {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .card__title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }
      .card__subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }
      .card__chevron {
        color: var(--text-muted);
        font-size: 22px;
        line-height: 1;
      }

      /* Service block */
      .service {
        padding: 16px 16px 16px;
        border-top: 1px solid var(--border-soft);
        margin-top: 4px;
      }
      .service__heading {
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        margin: 0 0 12px;
        font-weight: 600;
      }
      .service__row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
      }
      .service__hint {
        margin: 6px 0 0;
        padding: 0;
        font-size: 12px;
        color: var(--text-muted);
      }
      .service__resume[hidden] {
        display: none;
      }
      .service__resume {
        margin-top: 10px;
        width: 100%;
        display: flex;
        align-items: stretch;
        background: rgba(251, 191, 36, 0.12);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 10px;
        overflow: hidden;
      }
      .service__resume-action {
        flex: 1;
        padding: 10px 12px;
        background: transparent;
        color: inherit;
        border: 0;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        text-align: left;
      }
      .service__resume-dismiss {
        flex: 0 0 auto;
        padding: 0 12px;
        background: transparent;
        color: inherit;
        border: 0;
        border-left: 1px solid rgba(251, 191, 36, 0.25);
        font: inherit;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        opacity: 0.7;
      }
      .service__resume-dismiss:hover {
        opacity: 1;
      }

      /* Server status row */
      .server-status {
        font-size: 13px;
        color: var(--text-muted);
        font-feature-settings: "tnum";
      }
      .server-status__dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
        transition: background 200ms ease, box-shadow 200ms ease;
      }
      .server-status[data-state="ok"] .server-status__dot {
        background: var(--accent);
        box-shadow: 0 0 0 3px rgba(62, 218, 224, 0.16);
      }
      .server-status[data-state="ok"] .server-status__label { color: var(--text); }
      .server-status[data-state="down"] .server-status__dot {
        background: var(--danger);
        box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.16);
      }
      .server-status[data-state="down"] .server-status__label { color: var(--danger); }
      .server-status__label { flex: 1; }
      .server-status__restart {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        cursor: pointer;
        padding: 6px;
        border-radius: 8px;
        transition: opacity 120ms ease, color 120ms ease;
      }
      .server-status__restart[hidden] { display: none; }
      .server-status__restart:hover { color: var(--accent); }
      .server-status__restart[data-state="busy"] .server-status__icon {
        animation: rre-spin 900ms linear infinite;
      }
      .server-status__icon { width: 20px; height: 20px; display: block; }

      /* Auth row */
      .auth-row {
        font-size: 14px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .auth-row__site {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .auth-row__icon {
        width: 16px;
        height: 16px;
        display: inline-block;
        font-weight: 700;
        font-size: 14px;
        line-height: 16px;
        text-align: center;
      }
      .auth-row__icon[data-state="ok"]::before {
        content: "✓";
        color: #4ade80;
      }
      .auth-row__icon[data-state="bad"]::before {
        content: "✗";
        color: var(--danger);
      }
      .auth-row__icon[data-state="checking"]::before {
        content: "…";
        color: var(--text-muted);
      }
      .auth-row__name {
        color: var(--accent);
        text-decoration: none;
      }
      .auth-row__name[data-state="bad"] { color: var(--text-muted); }
      .auth-row__name[data-state="checking"] {
        color: var(--text-muted);
        pointer-events: none;
      }
      .auth-row__separator { color: var(--text-muted); }
      .auth-row__import {
        margin-left: auto;
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(62, 218, 224, 0.3);
        border-radius: 999px;
        padding: 8px 16px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 120ms ease;
      }
      .auth-row__import:hover:not(:disabled) {
        background: rgba(62, 218, 224, 0.18);
      }
      .auth-row__import:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Drill-down nav */
      .drill-nav {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-soft);
      }
      .drill-nav__back {
        background: transparent;
        border: 0;
        color: var(--accent);
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        padding: 4px 0;
      }
      .drill-nav__title {
        margin: 0;
        flex: 1;
        text-align: center;
        font-size: 16px;
        font-weight: 600;
      }

      /* Drill body (toggle list) */
      .drill-body {
        padding: 12px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .drill-subheading {
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        margin: 14px 0 8px;
        font-weight: 600;
      }
      .drill-subheading:first-child { margin-top: 0; }

      /* Toggle (reused from old popup, with caption support) */
      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 10px;
        margin: 0 -10px;
        border-radius: 10px;
        cursor: pointer;
        user-select: none;
        animation: rre-fade-in 260ms ease both;
        transition: background-color 140ms ease;
      }
      .toggle:hover { background: rgba(255, 255, 255, 0.03); }
      .toggle__body {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .toggle__label {
        font-size: 15px;
        transition: color 140ms ease;
      }
      .toggle:hover .toggle__label { color: var(--accent); }
      .toggle__caption {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 3px;
      }
      .toggle__switch {
        position: relative;
        width: 44px;
        height: 26px;
        border-radius: 999px;
        background: var(--pill-off);
        transition: background 160ms ease;
        flex-shrink: 0;
      }
      .toggle__switch::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--text);
        transition: transform 130ms cubic-bezier(0.2, 0.8, 0.2, 1), background 100ms ease;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      }
      .toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .toggle input:checked + .toggle__switch { background: var(--accent); }
      .toggle input:checked + .toggle__switch::after {
        transform: translateX(18px);
        background: var(--bg);
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <img class="header__mark" src="icons/icon-128.png" alt="" />
      <span class="header__title">Remanga Plus</span>
      <span class="header__chip">v0.6.0</span>
    </header>

    <main class="screens">
      <section class="screen" data-screen="main">
        <div class="cards">
          <button class="card" data-card="site" type="button">
            <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            <span class="card__body">
              <span class="card__title">Сайт</span>
              <span class="card__subtitle" data-card-subtitle="site"></span>
            </span>
            <span class="card__chevron" aria-hidden="true">›</span>
          </button>

          <button class="card" data-card="reader" type="button">
            <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
            <span class="card__body">
              <span class="card__title">Читалка</span>
              <span class="card__subtitle" data-card-subtitle="reader"></span>
            </span>
            <span class="card__chevron" aria-hidden="true">›</span>
          </button>

          <button class="card" data-card="premium-free" type="button">
            <svg class="card__icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true">
              <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" />
            </svg>
            <span class="card__body">
              <span class="card__title">Premium Free</span>
              <span class="card__subtitle" data-card-subtitle="premium-free"></span>
            </span>
            <span class="card__chevron" aria-hidden="true">›</span>
          </button>
        </div>

        <section class="service" data-service-block>
          <h2 class="service__heading">СЕРВИС</h2>

          <div class="service__row server-status" data-server-status>
            <span class="server-status__dot" data-server-dot></span>
            <span class="server-status__label" data-server-label>Проверка…</span>
            <button class="server-status__restart" data-server-restart type="button" hidden aria-label="Перезапустить parser-server">
              <svg class="server-status__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 12a8 8 0 0 1 13.66-5.66M20 12a8 8 0 0 1-13.66 5.66M16 4v4h4M8 20v-4H4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="service__row auth-row" data-auth-row>
            <span class="auth-row__site" data-auth-mangalib>
              <span class="auth-row__icon" data-auth-icon="mangalib"></span>
              <a class="auth-row__name" data-auth-link="mangalib" href="https://mangalib.me/" target="_blank" rel="noopener noreferrer">MangaLib</a>
            </span>
            <span class="auth-row__separator">·</span>
            <span class="auth-row__site" data-auth-remanga>
              <span class="auth-row__icon" data-auth-icon="remanga"></span>
              <a class="auth-row__name" data-auth-link="remanga" href="https://remanga.org/" target="_blank" rel="noopener noreferrer">Remanga</a>
            </span>
            <button class="auth-row__import" data-import-button type="button" disabled>Импорт →</button>
          </div>

          <p class="service__hint" data-auth-hint hidden></p>
          <div class="service__resume" data-resume-banner hidden>
            <button class="service__resume-action" data-resume-action type="button"></button>
            <button class="service__resume-dismiss" data-resume-dismiss type="button" aria-label="Скрыть">×</button>
          </div>
        </section>
      </section>

      <section class="screen" data-screen="site" hidden>
        <nav class="drill-nav">
          <button class="drill-nav__back" data-back="site" type="button">‹ Назад</button>
          <h2 class="drill-nav__title">Сайт</h2>
        </nav>
        <div class="drill-body" data-toggle-list="site"></div>
      </section>

      <section class="screen" data-screen="reader" hidden>
        <nav class="drill-nav">
          <button class="drill-nav__back" data-back="reader" type="button">‹ Назад</button>
          <h2 class="drill-nav__title">Читалка</h2>
        </nav>
        <div class="drill-body" data-toggle-list="reader"></div>
      </section>

      <section class="screen" data-screen="premium-free" hidden>
        <nav class="drill-nav">
          <button class="drill-nav__back" data-back="premium-free" type="button">‹ Назад</button>
          <h2 class="drill-nav__title">Premium Free</h2>
        </nav>
        <div class="drill-body" data-toggle-list="premium-free"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
