<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Remanga Enhancer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #131416;
        --bg-elevated: #18191b;
        --border: #27272a;
        --border-soft: rgba(64, 64, 67, 0.5);
        --text: #fafafa;
        --text-muted: #8a8f9c;
        --accent: #3edae0;
        --accent-soft: rgba(62, 218, 224, 0.12);
        --danger: #ff6b6b;
        --pill-off: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Exo 2", system-ui, -apple-system, sans-serif;
        font-size: 13px;
        width: 320px;
      }

      .header {
        padding: 16px 18px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border-soft);
      }

      .header__mark {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: conic-gradient(var(--accent) 0 50%, var(--bg-elevated) 50% 100%);
        position: relative;
      }

      .header__mark::after {
        content: "";
        position: absolute;
        inset: 5px;
        border-radius: 50%;
        background: linear-gradient(var(--bg) 50%, var(--accent) 50%);
        transform: rotate(45deg);
        opacity: 0.6;
      }

      .header__title {
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.01em;
      }

      .section {
        padding: 14px 18px 8px;
        border-bottom: 1px solid var(--border-soft);
      }

      .section:last-of-type {
        border-bottom: none;
      }

      .section__heading {
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        margin: 0 0 10px;
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 0;
        cursor: pointer;
        user-select: none;
      }

      .toggle__label {
        font-size: 13px;
      }

      .toggle__switch {
        position: relative;
        width: 32px;
        height: 18px;
        border-radius: 999px;
        background: var(--pill-off);
        transition: background 120ms ease;
        flex-shrink: 0;
      }

      .toggle__switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--text);
        transition: transform 140ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .toggle input:checked + .toggle__switch {
        background: var(--accent);
      }

      .toggle input:checked + .toggle__switch::after {
        transform: translateX(14px);
        background: var(--bg);
      }

      .actions {
        padding: 12px 18px 16px;
      }

      .button {
        width: 100%;
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(62, 218, 224, 0.3);
        border-radius: 999px;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 120ms ease, transform 120ms ease;
      }

      .button:hover {
        background: rgba(62, 218, 224, 0.18);
      }

      .button:active {
        transform: translateY(1px);
      }

      .button[data-state="busy"] {
        opacity: 0.6;
        pointer-events: none;
      }

      .button[data-state="error"] {
        color: var(--danger);
        border-color: rgba(255, 107, 107, 0.4);
        background: rgba(255, 107, 107, 0.12);
      }

      .button__icon {
        width: 14px;
        height: 14px;
      }

      .status {
        margin-top: 8px;
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <span class="header__mark" aria-hidden="true"></span>
      <span class="header__title">Remanga Enhancer</span>
    </header>

    <section class="section" data-section="header-buttons">
      <h2 class="section__heading">Шапка сайта</h2>
      <div data-toggle-group="hideHeaderButtons"></div>
    </section>

    <section class="section" data-section="home">
      <h2 class="section__heading">Главный экран</h2>
      <div data-toggle-group="home"></div>
    </section>

    <section class="actions">
      <button class="button" data-action="restart-parser">
        <svg class="button__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M4 12a8 8 0 0 1 13.66-5.66M20 12a8 8 0 0 1-13.66 5.66M16 4v4h4M8 20v-4H4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Перезапустить parser-server
      </button>
      <div class="status" data-status></div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
