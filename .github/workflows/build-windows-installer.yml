name: Build Windows installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Attach the .exe to a GitHub Release (set to 'true')"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis
          makensis -VERSION

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix parser-server ci

      - name: Build Windows installer
        run: npm run pkg:windows

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Remanga-Plus-Setup-${{ steps.version.outputs.version }}
          path: packaging/build-windows/Remanga-Plus-Setup.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/build-windows/Remanga-Plus-Setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
